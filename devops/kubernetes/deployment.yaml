apiVersion: apps/v1

kind: Deployment

metadata:
  name: dhps

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dhps

  template:

    metadata:
      labels:
        app: dhps

    spec:

      containers:

      - name: dhps

        image: dhps

        ports:

        - containerPort: 5000